<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXPLORE-MD-PAIR | Session Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%);
    }
    .container {
      background: rgba(20, 20, 30, 0.9);
      border: 1px solid #333;
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 0 40px rgba(255, 0, 80, 0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      font-size: 28px;
      background: linear-gradient(45deg, #ff0050, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .logo p { color: #888; font-size: 14px; }
    .input-group {
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #0f0f1a;
      color: #fff;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #ff0050;
    }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff0050, #ff6b6b);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 0, 80, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }
    .result.success {
      background: rgba(0, 255, 100, 0.1);
      border: 1px solid #00ff64;
      display: block;
    }
    .result.error {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff0040;
      display: block;
    }
    .code-display {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 8px;
      margin: 15px 0;
      color: #00ff64;
    }
    .instructions {
      margin-top: 15px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }
    .loading {
      text-align: center;
      display: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #ff0050;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔐 EXPLORE-MD-PAIR</h1>
      <p>WhatsApp Multi-Device Session Generator</p>
    </div>

    <div class="input-group">
      <label for="phone">📱 Phone Number (with country code)</label>
      <input 
        type="text" 
        id="phone" 
        placeholder="27634988678" 
        maxlength="15"
      >
    </div>

    <button id="generateBtn" onclick="generateCode()">
      ⚡ Generate Pairing Code
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Connecting to WhatsApp servers...</p>
    </div>

    <div class="result" id="result"></div>

    <div class="footer">
      <p>🔒 End-to-end encrypted | Powered by Baileys</p>
      <p>REDDRAGON © 2026</p>
    </div>
  </div>

  <script>
    async function generateCode() {
      const phoneInput = document.getElementById('phone');
      const btn = document.getElementById('generateBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      
      const phone = phoneInput.value.trim().replace(/[^0-9]/g, '');
      
      if (phone.length < 10) {
        result.className = 'result error';
        result.innerHTML = '❌ Please enter a valid phone number with country code (e.g. 27634988678)';
        return;
      }

      btn.disabled = true;
      loading.style.display = 'block';
      result.className = 'result';
      result.innerHTML = '';

      try {
        const response = await fetch(`/code?number=${phone}`);
        const data = await response.json();

        loading.style.display = 'none';
        btn.disabled = false;

        if (data.success) {
          result.className = 'result success';
          result.innerHTML = `
            <div style="text-align: center;">
              <p style="color: #00ff64; font-size: 18px;">✅ Pairing Code Generated!</p>
              <div class="code-display">${data.code}</div>
              <div class="instructions">
                <strong>How to link:</strong><br>
                1. Open WhatsApp on your phone<br>
                2. Go to Settings → Linked Devices<br>
                3. Tap "Link with phone number instead"<br>
                4. Enter the code above<br>
                5. Wait for the session file to be sent to your WhatsApp
              </div>
            </div>
          `;
        } else {
          result.className = 'result error';
          result.innerHTML = `❌ ${data.error || 'Failed to generate code'}`;
        }
      } catch (err) {
        loading.style.display = 'none';
        btn.disabled = false;
        result.className = 'result error';
        result.innerHTML = '❌ Network error. Please try again.';
      }
    }

    // Allow Enter key to submit
    document.getElementById('phone').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateCode();
    });
  </script>
</body>
</html>
